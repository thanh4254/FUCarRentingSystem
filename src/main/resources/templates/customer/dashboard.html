<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.sidebar{min-height:calc(100vh - 56px);background:#212529}
    .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
    .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <span class="text-white me-3"><i class="bi bi-person-circle"></i>
            <span th:text="${customer.customerName}"></span>
        </span>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link active" th:href="@{/customer/dashboard}"><i class="bi bi-house me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" th:href="@{/customer/cars}"><i class="bi bi-car-front me-2"></i>Thuê xe</a></li>
                <li><a class="nav-link" th:href="@{/customer/history}"><i class="bi bi-clock-history me-2"></i>Lịch sử</a></li>
                <li><a class="nav-link" th:href="@{/customer/profile}"><i class="bi bi-person me-2"></i>Hồ sơ</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-1">Xin chào, <span th:text="${customer.customerName}"></span>!</h4>
            <p class="text-muted mb-4">Chào mừng bạn đến với hệ thống thuê xe FU</p>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card p-3 border-start border-primary border-4">
                        <p class="text-muted mb-1 small">Số lần thuê xe</p>
                        <h3 class="fw-bold" th:text="${#lists.size(rentals)}">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 border-start border-success border-4">
                        <p class="text-muted mb-1 small">Email</p>
                        <p class="fw-semibold mb-0" th:text="${customer.email}"></p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 border-start border-warning border-4">
                        <p class="text-muted mb-1 small">Số điện thoại</p>
                        <p class="fw-semibold mb-0" th:text="${customer.mobile}"></p>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/customer/cars}" class="btn btn-primary">
                    <i class="bi bi-car-front"></i> Thuê xe ngay
                </a>
                <a th:href="@{/customer/history}" class="btn btn-outline-secondary">
                    <i class="bi bi-clock-history"></i> Xem lịch sử
                </a>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
