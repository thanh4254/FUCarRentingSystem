<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Đặt xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body class="py-4">
<nav class="navbar navbar-dark bg-dark px-3 mb-4">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <a th:href="@{/customer/cars}" class="btn btn-sm btn-outline-light me-2">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container" style="max-width:560px">
    <h4 class="fw-bold mb-4">Đặt xe</h4>
    <div class="card p-3 mb-4">
        <div class="d-flex gap-3 align-items-center">
            <div style="font-size:2.5rem"></div>
            <div>
                <h5 class="fw-bold mb-1" th:text="${car.carName}"></h5>
                <p class="text-muted mb-0"
                   th:text="${car.producer.producerName} + ' · ' + ${car.color} + ' · ' + ${car.capacity} + ' chỗ'"></p>
                <p class="text-success fw-bold mb-0"
                   th:text="${#numbers.formatDecimal(car.rentPrice,0,'COMMA',0,'POINT')} + ' VND/ngày'"></p>
            </div>
        </div>
    </div>
    <div class="card p-4">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form th:action="@{/customer/rent/{id}(id=${car.carId})}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Ngày nhận xe <span class="text-danger">*</span></label>
                <input type="date" name="pickupDate" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Ngày trả xe <span class="text-danger">*</span></label>
                <input type="date" name="returnDate" class="form-control" required>
            </div>
            <div class="alert alert-info small">
                <i class="bi bi-info-circle"></i>
                Tổng tiền = Giá thuê/ngày × Số ngày thuê. Thanh toán khi nhận xe.
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-calendar-check"></i> Xác nhận đặt xe
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
