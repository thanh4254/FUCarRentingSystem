<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Thuê xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.sidebar{min-height:calc(100vh - 56px);background:#212529}
    .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
    .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .car-card{transition:transform .2s}.car-card:hover{transform:translateY(-4px)}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" th:href="@{/customer/dashboard}"><i class="bi bi-house me-2"></i>Dashboard</a></li>
                <li><a class="nav-link active" th:href="@{/customer/cars}"><i class="bi bi-car-front me-2"></i>Thuê xe</a></li>
                <li><a class="nav-link" th:href="@{/customer/history}"><i class="bi bi-clock-history me-2"></i>Lịch sử</a></li>
                <li><a class="nav-link" th:href="@{/customer/profile}"><i class="bi bi-person me-2"></i>Hồ sơ</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4">Xe có sẵn để thuê</h4>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div class="row g-3">
                <div th:each="car : ${cars}" class="col-md-4">
                    <div class="card car-card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="fw-bold mb-0" th:text="${car.carName}"></h6>
                                <span class="badge bg-success">Available</span>
                            </div>
                            <p class="text-muted small mb-2"
                               th:text="${car.producer.producerName} + ' · ' + ${car.carModelYear}"></p>
                            <div class="row mb-3">
                                <div class="col-6 small">
                                    <i class="bi bi-palette text-muted"></i> <span th:text="${car.color}"></span>
                                </div>
                                <div class="col-6 small">
                                    <i class="bi bi-people text-muted"></i> <span th:text="${car.capacity} + ' chỗ'"></span>
                                </div>
                            </div>
                            <p class="small text-muted mb-3" th:text="${car.description}"></p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="text-success fw-bold fs-6"
                                          th:text="${#numbers.formatDecimal(car.rentPrice,0,'COMMA',0,'POINT')}"></span>
                                    <span class="text-muted small"> VND/ngày</span>
                                </div>
                                <a th:href="@{/customer/rent/{id}(id=${car.carId})}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-calendar-check"></i> Đặt ngay
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(cars)}" class="col-12 text-center py-5 text-muted">
                    <i class="bi bi-car-front fs-1 d-block mb-3"></i>
                    Hiện tại không có xe nào sẵn sàng
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
