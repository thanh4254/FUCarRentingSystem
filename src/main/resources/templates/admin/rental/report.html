<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Báo cáo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.sidebar{min-height:calc(100vh - 56px);background:#212529}
    .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
    .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people me-2"></i>Khách hàng</a></li>
                <li><a class="nav-link" th:href="@{/admin/cars}"><i class="bi bi-car-front me-2"></i>Xe</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals}"><i class="bi bi-journal-text me-2"></i>Giao dịch</a></li>
                <li><a class="nav-link active" th:href="@{/admin/rentals/report}"><i class="bi bi-bar-chart me-2"></i>Báo cáo</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4">Báo cáo Giao dịch theo kỳ</h4>
            <div class="card p-3 mb-4">
                <form th:action="@{/admin/rentals/report}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Từ ngày</label>
                        <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Đến ngày</label>
                        <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search"></i> Xem báo cáo
                        </button>
                    </div>
                </form>
            </div>
            <div th:if="${rentals != null}">
                <div class="d-flex justify-content-between mb-3">
                    <h6 class="mb-0">Kết quả: <span class="badge bg-primary" th:text="${#lists.size(rentals)}"></span> giao dịch</h6>
                    <small class="text-muted">Sắp xếp theo giá trị giảm dần</small>
                </div>
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                            <tr>
                                <th>#</th><th>Khách hàng</th><th>Xe</th>
                                <th>Ngày nhận</th><th>Ngày trả</th>
                                <th>Tổng tiền</th><th>Trạng thái</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="r, stat : ${rentals}">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${r.customer.customerName}"></td>
                                <td th:text="${r.car.carName}"></td>
                                <td th:text="${#temporals.format(r.pickupDate, 'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(r.returnDate, 'dd/MM/yyyy')}"></td>
                                <td class="fw-semibold text-success"
                                    th:text="${#numbers.formatDecimal(r.rentPrice,0,'COMMA',0,'POINT')} + ' VND'"></td>
                                <td>
                                    <span th:class="'badge ' + (${r.status == 'Completed'} ? 'bg-success' : 'bg-primary')"
                                          th:text="${r.status}"></span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rentals)}">
                                <td colspan="7" class="text-center text-muted py-4">Không có giao dịch trong khoảng thời gian này</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
