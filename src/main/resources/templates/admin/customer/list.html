<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.sidebar{min-height:calc(100vh - 56px);background:#212529}
    .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
    .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link active" th:href="@{/admin/customers}"><i class="bi bi-people me-2"></i>Khách hàng</a></li>
                <li><a class="nav-link" th:href="@{/admin/cars}"><i class="bi bi-car-front me-2"></i>Xe</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals}"><i class="bi bi-journal-text me-2"></i>Giao dịch</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals/report}"><i class="bi bi-bar-chart me-2"></i>Báo cáo</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4">Quản lý Khách hàng</h4>
            <div th:if="${success}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            </div>
            <form th:action="@{/admin/customers}" method="get" class="d-flex gap-2 mb-3">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control"
                       style="max-width:300px" placeholder="Tìm tên, email, SĐT...">
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i> Tìm</button>
                <a th:href="@{/admin/customers}" class="btn btn-outline-secondary">Xoá lọc</a>
            </form>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th><th>Họ tên</th><th>Email</th><th>SĐT</th>
                            <th>CMND/CCCD</th><th>Ngày sinh</th><th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${customers}">
                            <td th:text="${c.customerId}"></td>
                            <td class="fw-semibold" th:text="${c.customerName}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.mobile}"></td>
                            <td th:text="${c.identityCard}"></td>
                            <td th:text="${#temporals.format(c.birthday, 'dd/MM/yyyy')}"></td>
                            <td>
                                <a th:href="@{/admin/customers/delete/{id}(id=${c.customerId})}"
                                   class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Xác nhận xoá khách hàng này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(customers)}">
                            <td colspan="7" class="text-center text-muted py-4">Không có dữ liệu</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
