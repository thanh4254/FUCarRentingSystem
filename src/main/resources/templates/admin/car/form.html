<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${car.carId == null} ? 'Thêm xe' : 'Sửa xe'">Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body class="py-4">
<div class="container" style="max-width:700px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/cars}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left">back</i>
        </a>
        <h4 class="fw-bold mb-0"
            th:text="${car.carId == null} ? 'Thêm xe mới' : 'Chỉnh sửa xe'"></h4>
    </div>
    <div class="card p-4">
        <form th:action="${car.carId == null} ? @{/admin/cars/create} : @{/admin/cars/edit/{id}(id=${car.carId})}"
              method="post" th:object="${car}">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Tên xe <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{carName}" class="form-control" placeholder="VD: Toyota Camry">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Năm SX <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{carModelYear}" class="form-control" placeholder="2023">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Hãng sản xuất <span class="text-danger">*</span></label>
                    <select th:field="*{producer.producerId}" class="form-select">
                        <option value="">-- Chọn hãng --</option>
                        <option th:each="p : ${producers}" th:value="${p.producerId}" th:text="${p.producerName}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Màu sắc <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{color}" class="form-control" placeholder="Đen">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Số chỗ <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{capacity}" class="form-control" min="2" max="16">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Giá thuê/ngày (VND) <span class="text-danger">*</span></label>
                    <input type="number" th:field="*{rentPrice}" class="form-control" step="1000">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Ngày nhập <span class="text-danger">*</span></label>
                    <input type="date" th:field="*{importDate}" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Trạng thái <span class="text-danger">*</span></label>
                    <select th:field="*{status}" class="form-select">
                        <option value="Available">Available - Có sẵn</option>
                        <option value="Rented">Rented - Đang cho thuê</option>
                        <option value="Maintenance">Maintenance - Bảo trì</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Mô tả <span class="text-danger">*</span></label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-save"></i>
                    <span th:text="${car.carId == null} ? 'Thêm xe' : 'Lưu thay đổi'"></span>
                </button>
                <a th:href="@{/admin/cars}" class="btn btn-outline-secondary">Huỷ</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
