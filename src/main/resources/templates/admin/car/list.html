<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Quản lý Xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>body{background:#f8f9fa}.sidebar{min-height:calc(100vh - 56px);background:#212529}
    .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
    .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people me-2"></i>Khách hàng</a></li>
                <li><a class="nav-link active" th:href="@{/admin/cars}"><i class="bi bi-car-front me-2"></i>Xe</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals}"><i class="bi bi-journal-text me-2"></i>Giao dịch</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals/report}"><i class="bi bi-bar-chart me-2"></i>Báo cáo</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0">Quản lý Xe</h4>
                <a th:href="@{/admin/cars/create}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Thêm xe
                </a>
            </div>
            <div th:if="${success}" class="alert alert-success">
                <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            </div>
            <form th:action="@{/admin/cars}" method="get" class="d-flex gap-2 mb-3">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control" style="max-width:300px" placeholder="Tìm tên xe, màu, hãng...">
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i> Tìm</button>
                <a th:href="@{/admin/cars}" class="btn btn-outline-secondary">Xoá lọc</a>
            </form>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th><th>Tên xe</th><th>Hãng</th><th>Năm</th>
                            <th>Màu</th><th>Chỗ</th><th>Giá/ngày</th><th>Trạng thái</th><th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="car : ${cars}">
                            <td th:text="${car.carId}"></td>
                            <td class="fw-semibold" th:text="${car.carName}"></td>
                            <td th:text="${car.producer.producerName}"></td>
                            <td th:text="${car.carModelYear}"></td>
                            <td th:text="${car.color}"></td>
                            <td th:text="${car.capacity}"></td>
                            <td th:text="${#numbers.formatDecimal(car.rentPrice,0,'COMMA',0,'POINT')} + ' VND'"></td>
                            <td>
                                <span th:class="'badge ' + (${car.status == 'Available'} ? 'bg-success' : (${car.status == 'Rented'} ? 'bg-primary' : 'bg-warning text-dark'))"
                                      th:text="${car.status}"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/cars/edit/{id}(id=${car.carId})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/admin/cars/delete/{id}(id=${car.carId})}" class="btn btn-sm btn-outline-danger"
                                   onclick="return confirm('Xác nhận xoá/vô hiệu hoá xe này?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(cars)}">
                            <td colspan="9" class="text-center text-muted py-4">Không có dữ liệu</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
