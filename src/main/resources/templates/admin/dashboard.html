<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f8f9fa} .sidebar{min-height:calc(100vh - 56px);background:#212529}
        .sidebar .nav-link{color:#adb5bd;padding:.6rem 1rem;border-radius:6px;margin:2px 8px}
        .sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:#495057}
        .card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">FUCarRenting</span>
    <div class="ms-auto">
        <span class="text-white me-3"><i class="bi bi-person-badge"></i> Admin</span>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-sm btn-outline-light">Đăng xuất</button>
        </form>
    </div>
</nav>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li><a class="nav-link active" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people me-2"></i>Khách hàng</a></li>
                <li><a class="nav-link" th:href="@{/admin/cars}"><i class="bi bi-car-front me-2"></i>Xe</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals}"><i class="bi bi-journal-text me-2"></i>Giao dịch</a></li>
                <li><a class="nav-link" th:href="@{/admin/rentals/report}"><i class="bi bi-bar-chart me-2"></i>Báo cáo</a></li>
            </ul>
        </div>
        <main class="col-md-10 py-4 px-4">
            <h4 class="fw-bold mb-4">Dashboard</h4>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card p-3 border-start border-primary border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><p class="text-muted mb-1 small">Khách hàng</p>
                                <h3 class="fw-bold mb-0" th:text="${totalCustomers}">0</h3></div>
                            <i class="bi bi-people fs-2 text-primary"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 border-start border-success border-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><p class="text-muted mb-1 small">Giao dịch</p>
                                <h3 class="fw-bold mb-0" th:text="${totalRentals}">0</h3></div>
                            <i class="bi bi-journal-check fs-2 text-success"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card p-3" style="max-width:300px">
                <h6 class="fw-semibold mb-3">Thao tác nhanh</h6>
                <div class="d-grid gap-2">
                    <a th:href="@{/admin/cars/create}" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-plus-circle"></i> Thêm xe mới
                    </a>
                    <a th:href="@{/admin/customers}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-people"></i> Xem khách hàng
                    </a>
                    <a th:href="@{/admin/rentals/report}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-bar-chart"></i> Xem báo cáo
                    </a>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
