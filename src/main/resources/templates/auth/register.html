<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - FUCarRenting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; }</style>
</head>
<body class="py-5">
<div class="container" style="max-width:680px">
    <div class="text-center mb-4">
        <h2 class="text-white fw-bold">FUCarRenting</h2>
        <p class="text-white-50">Tạo tài khoản mới</p>
    </div>
    <div class="card p-4 shadow-lg rounded-4">
        <h4 class="mb-4 fw-semibold">Thông tin đăng ký</h4>
        <form th:action="@{/register}" method="post" th:object="${customer}">
            <div class="row g-3">
                <div class="col-12"><h6 class="text-muted border-bottom pb-1">Tài khoản</h6></div>
                <div class="col-md-6">
                    <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" required>
                    <small class="text-danger" th:text="${usernameError}"></small>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>
                <div class="col-12 mt-2"><h6 class="text-muted border-bottom pb-1">Thông tin cá nhân</h6></div>
                <div class="col-md-6">
                    <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{customerName}" class="form-control">
                    <div class="text-danger small" th:errors="*{customerName}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <small class="text-danger" th:text="${emailError}"></small>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{mobile}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày sinh <span class="text-danger">*</span></label>
                    <input type="date" th:field="*{birthday}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">CMND/CCCD <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{identityCard}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số bằng lái <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{licenceNumber}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Ngày cấp bằng <span class="text-danger">*</span></label>
                    <input type="date" th:field="*{licenceDate}" class="form-control">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-person-plus"></i> Đăng ký
                </button>
                <a th:href="@{/login}" class="btn btn-outline-secondary">Quay lại</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
