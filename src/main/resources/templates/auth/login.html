<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - FUCarRenting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width:420px">
    <div class="text-center mb-4">
        <div style="font-size:3rem"></div>
        <h2 class="text-white fw-bold">FUCarRenting</h2>
        <p class="text-white-50">Hệ thống cho thuê xe FU</p>
    </div>
    <div class="card p-4 shadow-lg rounded-4">
        <h4 class="fw-semibold mb-4">Đăng nhập</h4>
        <div th:if="${param.error}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle"></i> Tên đăng nhập hoặc mật khẩu không đúng!
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2">
            <i class="bi bi-check-circle"></i> Đăng xuất thành công!
        </div>
        <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
            </button>
        </form>
        <hr class="my-3">
        <p class="text-center mb-2 text-muted small">
            Chưa có tài khoản? <a th:href="@{/register}" class="fw-semibold">Đăng ký ngay</a>
        </p>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
